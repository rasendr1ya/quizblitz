syntax = "proto3";

package stream;

service StreamService {
  rpc WatchQuizEvents (WatchRequest) returns (stream QuizEvent);
  rpc WatchLeaderboard (WatchRequest) returns (stream LeaderboardUpdate);
}

message WatchRequest {
  string session_id = 1;
  string player_id = 2;
}

enum EventType {
  UNKNOWN = 0;
  QUESTION_START = 1;
  TIMER_TICK = 2;
  ANSWER_REVEAL = 3;
  PLAYER_JOINED = 4;
  QUIZ_END = 5;
}

message QuestionData {
  string question_id = 1;
  string text = 2;
  repeated string options = 3;
  int32 time_limit = 4;
  int32 question_number = 5;
  int32 total_questions = 6;
}

message QuizEvent {
  EventType type = 1;
  QuestionData question = 2;
  string message = 3;
  int32 timer_remaining = 4;
  string correct_answer = 5;
}

message LeaderboardEntry {
  string player_name = 1;
  int32 score = 2;
  int32 rank = 3;
}

message LeaderboardUpdate {
  repeated LeaderboardEntry entries = 1;
  string triggered_by = 2;
}
